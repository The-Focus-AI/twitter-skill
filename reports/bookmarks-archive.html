<style>
:root{--bg:#000;--surface:#111;--surface-hover:#181818;--border:#222;--text:#e7e9ea;--text-secondary:#71767b;--accent:#1d9bf0;--like:#f91880;--retweet:#00ba7c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.header-inner{max-width:680px;margin:0 auto;padding:12px 16px}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header h1{font-size:20px;font-weight:700}
.header .count{color:var(--text-secondary);font-size:13px}
.search-box{width:100%;background:#202327;border:1px solid transparent;border-radius:9999px;padding:10px 16px;color:var(--text);font-size:15px;outline:none;transition:all .2s}
.search-box:focus{border-color:var(--accent);background:#000}
.search-box::placeholder{color:var(--text-secondary)}
.filters{display:flex;gap:0;margin-top:12px;border-bottom:1px solid var(--border);overflow-x:auto}
.filter-btn{flex:1;min-width:0;background:none;border:none;border-bottom:2px solid transparent;padding:12px 16px;color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;text-align:center}
.filter-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.filter-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.container{max-width:680px;margin:0 auto;padding:0 0 80px}
.date-section{padding:12px 16px;font-size:15px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);scroll-margin-top:120px;position:sticky;top:105px;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:10}
.tweet{border-bottom:1px solid var(--border);padding:12px 16px;transition:background .15s;cursor:pointer}
.tweet:hover{background:var(--surface-hover)}
.tweet-header{display:flex;gap:12px;align-items:flex-start}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;object-fit:cover;background:#333}
.tweet-header-right{flex:1;min-width:0}
.author-line{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
.author-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.author-handle,.tweet-date,.dot{color:var(--text-secondary);font-size:15px}
.tweet-body{margin-top:4px;padding-left:52px}
.tweet-text{font-size:15px;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.tweet-text a{color:var(--accent);text-decoration:none}
.tweet-text a:hover{text-decoration:underline}
.tweet-text.collapsed{max-height:200px;overflow:hidden;position:relative}
.tweet-text.collapsed::after{content:"";position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--bg));pointer-events:none}
.tweet:hover .tweet-text.collapsed::after{background:linear-gradient(transparent,var(--surface-hover))}
.show-more{color:var(--accent);font-size:14px;cursor:pointer;margin-top:4px;display:inline-block;font-weight:500}
.show-more:hover{text-decoration:underline}
.tweet-media{margin-top:12px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.tweet-media img{width:100%;display:block;max-height:500px;object-fit:cover}
.tweet-media.multi{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.tweet-media.multi img{max-height:280px}
.video-badge{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px}
.media-wrapper{position:relative}
.article-card{margin-top:12px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface)}
.article-card .article-title{padding:12px 16px;font-size:15px;font-weight:700;line-height:1.3}
.article-card .article-preview{padding:0 16px 12px;font-size:14px;color:var(--text-secondary);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.metrics{display:flex;gap:0;margin-top:12px;max-width:400px;justify-content:space-between}
.metric{display:flex;align-items:center;gap:4px;color:var(--text-secondary);font-size:13px;padding:4px 0;transition:color .15s}
.metric svg{width:18px;height:18px}
.metric.reply:hover{color:var(--accent)}
.metric.rt:hover{color:var(--retweet)}
.metric.like:hover{color:var(--like)}
.metric.view:hover{color:var(--accent)}
.metric.bm:hover{color:var(--accent)}
.no-results{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:15px}
.toc{position:fixed;right:max(24px,calc((100vw - 680px)/2 - 220px));top:130px;width:180px;font-size:13px}
.toc-title{font-weight:700;margin-bottom:8px;color:var(--text)}
.toc a{display:block;padding:4px 8px;color:var(--text-secondary);text-decoration:none;border-radius:8px;transition:all .15s}
.toc a:hover{color:var(--text);background:var(--surface)}
@media(max-width:1100px){.toc{display:none}}
@media(max-width:600px){.tweet-body{padding-left:0;margin-top:8px}.avatar{width:36px;height:36px}.filter-btn{padding:10px 8px;font-size:13px}}
</style>

const TWEETS=[{"created_at":"2026-03-30T03:12:41.000Z","id":"2038454336355999749","edit_history_tweet_ids":["2038454336355999749"],"text":"I wanted to share a bunch of my favorite hidden and under-utilized features in Claude Code. I'll focus on the ones I use the most.\n\nHere goes.","public_metrics":{"retweet_count":1674,"reply_count":379,"like_count":16280,"quote_count":293,"bookmark_count":36027,"impression_count":1858673},"author_id":"159337660","_media":[]},{"created_at":"2026-03-27T21:11:03.000Z","note_tweet":{"text":"🚨BREAKING: Every book you have ever read. Every novel that has ever been published. It is sitting inside ChatGPT right now.\n\nWord for word. Up to 90% of it. And OpenAI told a judge that was impossible.\n\nResearchers at Stony Brook University and Columbia Law School just proved it.\n\nThey fine tuned GPT-4o, Gemini 2.5 Pro, and DeepSeek V3.1 on a simple task: expand a plot summary into full text. A normal use case. The kind of thing a writing assistant is built for. No hacking. No jailbreaking. No tricks.\n\nThe models started reciting copyrighted books from memory.\n\nNot paraphrasing. Not summarizing. Entire pages reproduced verbatim. Single unbroken spans exceeding 460 words. Up to 85 to 90% of entire copyrighted novels. Word for word.\n\nThen it got worse.\n\nThe researchers fine tuned the models on the works of only one author. Haruki Murakami. Just his novels. Nothing else.\n\nIt unlocked verbatim recall of books from over 30 completely unrelated authors.\n\nOne author's books opened the vault to everyone else's. The memorization was already inside the model the whole time. The fine tuning just removed the lock. Your book might be in there right now. You would never know it unless someone looked.\n\nEvery safety measure the companies rely on failed. RLHF failed. System prompts failed. Output filters failed. The exact protections these companies cite in courtroom defenses did not stop a single page from being extracted.\n\nThen the researchers compared the three models. GPT-4o. Gemini. DeepSeek. Three different companies. Three different countries. They all memorized the same books in the same regions. The correlation was 0.90 or higher.\n\nThat means they all trained on the same stolen data. The paper names the sources directly: LibGen and Books3. Over 190,000 copyrighted books obtained from pirated websites.\n\nRight now, authors and publishers have dozens of active lawsuits against OpenAI, Anthropic, Google, and Meta. These companies have argued in court that their models learn patterns. Not copies. That no book is stored inside the weights.\n\nThis paper says that is a lie. The books are still inside. And researchers just pulled them out."},"id":"2037638554374099409","edit_history_tweet_ids":["2037638554374099409"],"attachments":{"media_keys":["3_2037638551341568000"]},"text":"🚨BREAKING: Every book you have ever read. Every novel that has ever been published. It is sitting inside ChatGPT right now.\n\nWord for word. Up to 90% of it. And OpenAI told a judge that was impossible.\n\nResearchers at Stony Brook University and Columbia Law School just proved https://t.co/OueEqXZnr7","public_metrics":{"retweet_count":2783,"reply_count":251,"like_count":7089,"quote_count":280,"bookmark_count":2791,"impression_count":413471},"author_id":"1916904726295453696","entities":{"urls":[{"start":277,"end":300,"url":"https://t.co/OueEqXZnr7","expanded_url":"https://x.com/heynavtoor/status/2037638554374099409/photo/1","display_url":"pic.x.com/OueEqXZnr7","media_key":"3_2037638551341568000"}]},"_media":[{"url":"https://pbs.twimg.com/media/HEcld3FbEAArYDE.jpg","type":"photo","width":1055,"height":1200}]},{"created_at":"2026-03-27T14:38:50.000Z","id":"2037539850275127697","edit_history_tweet_ids":["2037539850275127697"],"text":"We've stopped buying SaaS and and are moving everything to agents, skills and just-in-time apps.\n\nIn some cases, we've canceled subscriptions altogether and saved $10k+/year in the process.\n\nHere's our early success stories 🧵","public_metrics":{"retweet_count":19,"reply_count":32,"like_count":314,"quote_count":23,"bookmark_count":570,"impression_count":123819},"author_id":"1413148902279155730","_media":[]},{"created_at":"2026-03-23T15:11:11.000Z","article":{"media_entities":["3_2035454817225916416"],"preview_text":"One of my clients drove over 3 million in revenue... all from a script we generated by our army of 20 agents. \n\nHere’s exactly how it works:\n(and yes, this is a real tool and real use case)\n \nMyself,","cover_media":"3_2035480953796386816","plain_text":"One of my clients drove over 3 million in revenue... all from a script we generated by our army of 20 agents. \n\nHere’s exactly how it works:\n(and yes, this is a real tool and real use case)\n \nMyself, @Oasiszn, and @MattEpstein16 (follow them!) have 2B+ views on vids we've written. We've won Emmys. We know what makes good content.\nMost people write the same way they regularly use AI.\nOpen ChatGPT or Claude.\nType a prompt.\nTake whatever it says, and call it done.\nThat's how you get garbage. Light it on fire.\nBurn it to the ground.\nWe built 20 specialized AI agents that write better than any human.\nEach agent lives within Claude Code in its own context window, specializes in one thing, and has its own quality bar it has to hit. We give it a brand name and a product brief, walk away, and come back to a finished, production ready script sitting in a doc.\nThis system has helped generate over $10M in revenue for our clients through launch videos we've made for them.\nThe videos have 50M views... and hit #1 trending on X.\nLet me show you how it works:\n \nThe Research Phase No Human Would Do\nBefore a single word of script gets written, the system runs a full research sweep across the entire internet.\nOn YouTube, it runs 15 keywords searches across three separate time-filtered passes. All time. Last 12 months. Last 30 days.\nFor each keyword, the system finds the highest-performing video, that's the ceiling, and then collects patterns downward until there's a massive drop-off in views.\n1.5M to 45K? That's the floor. Stop there.\nThe titles at the ceiling are the patterns worth stealing.\nMost teams do 1 search on X for what customers are saying and call it research. This system pulls hundreds, scores them, and filters automatically.\nOn Reddit, it mines for real customer pain. And grabs exact quotes.\nFinds the most viral threads from the past 10 years, dives deep to find the controversy, what has the most downvotes?\nOn X, it pulls roughly 5,000 posts (via API), sorted by engagement.\nThe same ceiling/floor logic applies. High quote tweet ratio means posts where people fought in the replies. That's content with nerves. That's what we're looking for.\nEverything that comes out of the research phase gets indexed as ammunition for the agents that come next.\n \nThe Writing Pipeline\nThis is where it separates from anything else I've seen.\nMost AI script tools have a single agent write the whole thing.\nThat's like hiring one person to be your researcher, copywriter, editor, fact checker, and creative director and expecting them to do a good job.\nThat's idiotic.\nSpecialized agents run in sequence and each one has exactly one job.\nThe Hook Agent:\n→ Writes 4 hooks, each data backed from our database of proven hooks with millions of views across socials.\n→ Every hook goes through a minimum of 3 full iterations, with a complete diagnosis of what's weak before it gets rewritten.\n→ Then the Hook Manager scores it across 5 dimensions and everything has to hit 10/10.\nIt doesn't pass? We sent it back and the Hook Agent rewrites it.\nNothing moves forward until it clears the gate.\nThe same structure runs for the body, for the CTA, for everything. The agents don't just write. They each have a boss who won't let anything through that isn't ready.\n \nThe Weapons Check\nThis is the part I think about the most when I explain this system to people.\nEvery single line in the script gets scored on two dimensions independently.\n→ Invention Novelty: does this line make the product feel like a genuine breakthrough?\n→ Copy Intensity: is it sharp enough that someone reading it actually feels something, not just understands something?\nBoth have to hit 10/10. A novel idea with flat copy fails. Sharp copy about a boring feature fails.\nLines that don't pass get rewritten. Lines that are pure filler with no possible weapon version get cut entirely.\nCharacter budgets are hard enforced throughout the whole pipeline. Every line earns its place or it gets removed.\nThis is why our scripts feel different from what most founders end up with.\nThe average launch script has 3 great lines and 40 seconds of filler the founder stumbles through awkwardly on camera. Every line in ours survived a weapons check.\n \nThe Output\nThe whole thing lands in a Google Doc with three tabs. Research, Working Script, and Final Script.\n→ The Research tab has everything pulled across YouTube, Reddit, and X.\n→ The Working Script tab shows every iteration, diagnosis, and rewrite from every agent so you have a full paper trail.\n→ The Final Script tab is clean and copy paste ready with 4 hook options and 2 CTA options.\nFrom there humans go through each line tactically and edit until perfection.\nThese agents are trained on our writing, giving it a true advantage over other AI writing tools and general copywriting agents.\n \n❗ If you want the exact breakdown of how each agent works FOLLOW & comment \"AGENT\" on this post and I'll send it to you! ❗\n \nWhy This Actually Matters\nThe system doesn't guarantee virality… nothing does.\nBut it gives you a script built on data from hundreds of top performing videos, written by agents that won't ship anything below a 10/10, with every second of runtime forced to justify its existence before it makes the cut.\nThat's why our launches average 2M views per video.\nFounders spend months building the product and 30 minutes thinking about the script.\nThe script is usually the thing that decides whether anyone ever sees what they built.\nIf your company is launching something soon and you want a video built by a system that actually does this at scale, DM me. Pricing starts at $100K.\nGet Shown.","entities":{"mentions":[{"start":8,"end":16,"username":"Oasiszn"},{"start":22,"end":36,"username":"MattEpstein16"}],"urls":[{"text":"https://abs-0.twimg.com/emoji/v2/svg/2757.svg"},{"text":"https://x.com/@Oasiszn"},{"text":"https://abs-0.twimg.com/emoji/v2/svg/2757.svg"}]},"title":"I turned my client into a millionaire using Claude Code"},"id":"2036098438908293349","edit_history_tweet_ids":["2036098438908293349"],"text":"https://t.co/1AX8svq17s","public_metrics":{"retweet_count":390,"reply_count":2772,"like_count":5598,"quote_count":63,"bookmark_count":24311,"impression_count":5362592},"author_id":"777600100189081600","entities":{"urls":[{"start":0,"end":23,"url":"https://t.co/1AX8svq17s","expanded_url":"http://x.com/i/article/2035101919669362688","display_url":"x.com/i/article/2035…","status":500,"unwound_url":"https://x.com/i/article/2035101919669362688"}]},"_media":[]},{"created_at":"2026-03-26T18:36:54.000Z","id":"2037237372904235051","edit_history_tweet_ids":["2037237372904235051"],"attachments":{"media_keys":["3_2037237365669060609"]},"text":".@tylercowen keeps *getting it*, re the use of ai at every level, in a manner so complete to border on mogging https://t.co/oNQ7P9ntQA","public_metrics":{"retweet_count":10,"reply_count":2,"like_count":321,"quote_count":1,"bookmark_count":327,"impression_count":41247},"author_id":"1423560972959199235","entities":{"urls":[{"start":111,"end":134,"url":"https://t.co/oNQ7P9ntQA","expanded_url":"https://x.com/lumpenspace/status/2037237372904235051/photo/1","display_url":"pic.x.com/oNQ7P9ntQA","media_key":"3_2037237365669060609"}],"mentions":[{"start":1,"end":12,"username":"tylercowen","id":"8496762"}]},"_media":[{"url":"https://pbs.twim ,"author_id":"22730423","entities":{"urls":[{"start":53,"end":76,"url":"https://t.co/vG5VUMGJjd","expanded_url":"https://x.com/charliebcurran/status/2034760727211483522/video/1","display_url":"pic.x.com/vG5VUMGJjd","media_key":"13_2034759050962018304"}]},"_media":[{"url":"https://pbs.twimg.com/media/HDzx3btbkAAxLCb.jpg","type":"video","width":1920,"height":1080}]},{"created_at":"2026-03-20T13:00:01.000Z","note_tweet":{"text":"This week, I encoded Edward Tufte's data visualization principles into an API. Then I let an AI agent try to pass it.\n\nI gave @ManusAI a CSV of women's bachelor's degree percentages across STEM fields (1970-2011) and one prompt: visualize this data.\n\nIt produced a standard chart. Correct data, readable axes, nothing wrong. But a legend box instead of direct labels. No annotations calling out the rise and fall of women in Computer Science. Default colors. This is what every AI agent produces right now.\n\nSo I pointed it at the Tufte Test, a quality standard I built in Truesight that checks charts against seven of Tufte's core principles. The API came back: fail on direct labeling and integrated annotations. Five other criteria passed.\n\nA quality standard gives an agent something a vague prompt never can: a precise list of exactly what to fix.\n\nManus revised on its own. Legend box became direct endpoint labels. A subtitle surfaced the key insight. An annotation marked the Computer Science peak at 37.1% in 1983. Two prompts total from me. Everything else was autonomous.\n\nAny AI agent that can call an API could do this. What matters is the pattern: encode expert judgment once, deploy it as an API, and every AI agent in your stack builds against it. Your taste becomes infrastructure at scale instead of manual review.\n\nThe Tufte Test is available as a template in Truesight if you want to try it on your own charts.\n\nFull writeup + demo video: https://t.co/Xkc9AK87xG","entities":{"mentions":[{"start":126,"end":134,"username":"ManusAI","i uths. They're hard-won opinions shaped by practice. Take what's useful.\n1. AI should be accessible\n \nAI shouldn't be gatekept behind academic jargon, hype-driven marketing, or expensive credentials. The concepts that matter — transformers, attention, embeddings, agents, the latent space itself — can be explained clearly from first principles to anyone willing to learn. If your explanation requires a PhD to parse, the explanation is the problem, not the audience.\nAccessibility isn't charity. It's how you build a broader, more capable workforce that can actually use these tools. Every person who understands what's happening inside the model — not just how to call the API — is a person who builds better products, writes better prompts, and designs better loops. Democratise the knowledge. The technology is already democratised.\n \n2. shipping is the heartbeat\nShipping is the heart of the company and the health of the company. A team that ships frequently is a team that learns frequently. A team that queues up releases is a team that queues up learning.\nBug fixes should be live within minutes. Not hours, days, or weeks. If your deployment pipeline can't support that, fix the pipeline before you fix the bug. Every minute between \"merged\" and \"live\" is an minute your users are running broken software and an minute your team is context-switching instead of moving forward. Fast deploys aren't a luxury — they're how you stay alive.\n3. humans on the loop, agents in the loop\nSoftware development is now automated. \n \nWhat is not — and cannot be — is taste, responsibility, accountability, and customer satisfaction. These are irreducibly human. No agent has skin in the game. No model cares whether the customer is happy.\nHumans design the loops. Agents execute within them. Engineering oversight and discipline are what separate a product from a demo. The human isn't \"in the loop\" as a fallback — the human is on the loop as the architect, the accountable party, the one who decides what \"good enough\" means and what ships.\n4. tokens are cheaper than people\nToken costs are cheaper than hiring a human. There's a persistent belief that token pricing is subsidised and will inevitably rise. Maybe. We don't know. But open-source models are becoming exceptionally good and they are very cheap. The trajectory is clear: inference costs fall, model quality rises, and the economics tilt further toward automation every quarter.\nDesign for that reality, not the fear of a price hike that may never come. The team that spends tokens liberally on evaluation, retries, and backpressure — while their competitors ration tokens and ship manually — will compound their advantage. Latency budgets and rate limits still matter as engineering constraints, but cost anxiety should never be the reason you keep a human doing work an agent can do reliably.\n \n5. software is clay\nAny problem in software can now be resolved through targeted application of ralph loops by a skilled operator. AI stands for Amplified Intelligence — it amplifies what you know. It doesn't replace your judgement, it multiplies your reach. Humans should be designing loops for the agent, setting safety guardrails, and providing taste — what should or should not be built, and how it will be built.\nSoftware is now clay. Instead of waiting for perfect, just get it done. Get it into the hands of customers and iterate. Iteration is the name of the game now. The team that ships ten imperfect versions while their competitor architects one perfect version will win every time. If your competitor ships faster than you, you lose. Mould the clay. Ship it. Reshape it tomorrow.\n \n6. capture your backpressure\nThe entire game now is to maximise the capture of your backpressure so agents stay on the rails. Backpressure is the automated feedback — type systems, test suites, linters, build errors, browser assertions — that tells an agent it went wrong before a human ever has to look. Without it, you become the bottleneck, manually catching trivial errors that a compiler or a test suite would have caught instantly.\nIf you have to go into the loop to rescue an agent, that is an anti-pattern. Don't just fix the output — ask why the agent went off the rails and engineer away that failure concern. Add a type constraint. Write a test. Tighten the schema. Every rescue mission you eliminate is capacity you reclaim for designing better loops. The goal is just enough backpressure to reject hallucinations and invalid output without creating so much resistance that the system grinds to a halt. Part art, part engineering, wholly non-negotiable.\n \n7. verify, don't just test\nSoftware verification is the name of the game now. When agents write most of the code, traditional unit tests — written by the same fallible process that produced the code — aren't enough. The backpressure has to be stronger than the generative function. Formal methods, type theory, property-based tests, and deterministic simulation testing are the future.\nTypes prove properties at compile time. Property-based tests explore input spaces no human would think to cover. Deterministic simulation testing lets you reproduce and verify complex system behaviour without flaky infrastructure. These aren't academic luxuries — they're the engineering tools that let you trust agent-generated code at scale. The more you verify mechanically, the less you rely on human review to catch what slipped through.\n \n8. design for observability\nYour entire product or system should be one observable loop that's available for automatic retrieval by an agent. Not dashboards for humans to squint at — structured, queryable telemetry that an agent can consume, reason about, and act on without asking you to interpret a graph.\nIf an agent can't observe the state of your system, it can't debug it, it can't improve it, and it can't close the loop. Observability isn't a monitoring feature — it's the substrate that makes autonomous operation possible. Every log line, every metric, every trace is a signal an agent can use to stay on the rails or self-correct when it drifts.\n \n9. agents need boundaries, not freedom\nAutonomous agents sound powerful. In practice, unconstrained agents are unpredictable, expensive, and fragile. The most effective agents operate within tight boundaries — clear tool definitions, explicit action spaces, well-defined termination conditions.\nGive your agent the smallest set of tools it needs. Define what \"done\" looks like. Set budget limits. Build in circuit breakers. Freedom without structure produces chaos, not intelligence.\n \n10. context windows are not infinite memory\nA large context window doesn't mean you should stuff everything into it. Attention degrades. Retrieval accuracy drops. Latency climbs. Cost scales linearly. More context often means worse answers, not better ones.\nBe surgical about what goes into the context window. Every token should earn its place. The discipline of working within constraints — choosing what to include and what to leave out — produces better results than brute-force context stuffing.\n \n11. the model is a material, not a feature\nWhen you treat an LLM as a feature you bolt on — a chatbot widget, an \"AI-powered\" badge — you get something brittle and forgettable. When you treat it as a material you build with, like concrete or steel, you start asking different questions. What are its failure modes? Where does it flex? Where does it crack?\nGood builders understand their materials. LLMs hallucinate, drift, and surprise you. They're also capable of remarkable reasoning when given the right constraints. Build with the grain, not against it.\n \n12. the moat is in the workflow, not the model\nModels are commoditising. The model you're using today will be surpassed within months. Your moat isn't model access — everyone has that. Your moat is the workflow you build around it: the data pipeline, the evaluation framework, the feedback loops, the domain expertise encoded in your prompts and tooling.\nBuild products that get better with usage. Capture feedback. Improve your evals. Tighten your loops. That's the compounding advantage no model swap can replicate.\n \n13. a feature today is tech debt tomorrow\nBuild in a way that makes change easy. Build so it's easy to delete. If you add functionality to compensate for a model's weakness today, that functionality becomes dead weight — or a noose around your company's neck — as the models get better. The workaround you shipped last quarter is the legacy system you're maintaining next year.\nModels improve faster than codebases evolve. Every layer of scaffolding you bolt on to patch a model limitation is a layer you'll need to rip out when the limitation disappears. Build for change, not for the current snapshot of model capability. Loose coupling, thin abstractions, code that's cheaper to delete than to understand. The best code in an AI-native product is the code you can throw away without flinching.\n14. build where the puck is going\nThe last forty years of software has been designed for humans. Even operating systems haven't really been designed for agents — they've been designed for a world where humans are the operators. Every process, every tool, every workflow carries that assumption. When you find something that feels immovable — a way software is built, a ceremony teams perform, a constraint everyone accepts — apply first-principles thinking. Ask why it exists. You'll often find the answer is: because it was designed for humans.\nOnce you reach that resolution, you can interrogate it. Is it falsified by the new reality? Was it a good idea originally? What was the original intent, and does that intent survive when agents are the operators? Sometimes the intent is still valid and you carry it forward in a new form. Sometimes it was only ever a workaround for human limitations and you can discard it entirely. The opportunity is to take those insights and apply them to the new world of the latent space — building where the puck is going, not where it is.\n \nThanks for reading folks. Not too much longer now until I launch @latentpatterns. I will help anyone who wants to learn. I'll sit down with you and get you to your holy shit moment if you're willing, but all I ask is for you to pass that knowledge on to another person...\n \n\nP.S. Yes, indeed, this entire post was authored using AI, with careful human judgment, review, and editing. I wrote it just as I'm writing this message in the closer of this article using Super Whisper, which is a voice-to-text app. I prompted my agent about the core principles and the philosophies behind them, and it just filled in the gaps. It's paint-by-numbers now. Paint by Numbers is now the name of the game, and it's state of the art.","entities":{"mentions":[{"start":36,"end":51,"username":"latentpatterns"},{"start":65,"end":80,"username":"latentpatterns"}],"tweets":[{"id":"2012416900748525995"},{"id":"1934602159984984235"},{"id":"2024091297435222368"},{"id":"1939391215482601868"},{"id":"1998059600780865979"},{"id":"2022159874726252829"},{"id":"2023451481735872915"},{"id":"2025376651543232858"}],"urls":[{"text":"https://latentpatterns.com/for/enterprise"},{"text":"https://latentpatterns.com/glossary/transformer"},{"text":"https://latentpatterns.com/glossary/ralph-wiggum"},{"text":"https://latentpatterns.com/glossary/agent-backpressure"},{"text":"https://latentpatterns.com/glossary/technical-debt"},{"text":"https://latentpatterns.com/glossary/property-based-testing"},{"text":"https://latentpatterns.com/glossary/attention"},{"text":"https://latentpatterns.com/glossary/embedding"},{"text":"https://latentpatterns.com/glossary/type-system"},{"text":"https://latentpatterns.com/for/enterprise"},{"text":"https://latentpatterns.com/glossary/context-window"},{"text":"https://abs-0.twimg.com/emoji/v2/svg/2764.svg"},{"text":"https://latentpatterns.com/glossary/agent"}]},"title" let currentSort='date-desc',searchQuery='';
function fmt(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(n>=1e3)return(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';return String(n)}
function fmtDate(iso){const d=new Date(iso),now=new Date(),diff=now-d;if(diff<864e5)return Math.floor(diff/36e5)+'h';if(diff<6048e5)return Math.floor(diff/864e5)+'d';if(d.getFullYear()===now.getFullYear())return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function monthKey(iso){return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'long'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function linkify(t){let h=esc(t);h=h.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');h=h.replace(/@(\w+)/g,'<a href="https://twitter.com/$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">@$1</a>');h=h.replace(/#(\w+)/g,'<a href="https://twitter.com/hashtag/$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">#$1</a>');return h}
function getSorted(tw){const s=[...tw];switch(currentSort){case'date-desc':s.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));break;case'date-asc':s.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));break;case'likes':s.sort((a,b)=>(b.public_metrics?.like_count||0)-(a.public_metrics?.like_count||0));break;case'impressions':s.sort((a,b)=>(b.public_metrics?.impression_count||0)-(a.public_metrics?.impression_count||0));break;case'bookmarks':s.sort((a,b)=>(b.public_metrics?.bookmark_count||0)-(a.public_metrics?.bookmark_count||0));break}return s}
function getFiltered(tw){if(!searchQuery)return tw;const q=searchQuery.toLowerCase();return tw.filter(t=>{const text=(t.note_tweet?.text||t.article?.plain_text||t.text||'').toLowerCase();const a=AUTHORS[t.author_id];const at=a?(a.name+' '+a.username).toLowerCase():'';return text.includes(q)||at.includes(q)})}
function renderTweet(t){const a=AUTHORS[t.author_id]||{name:'Unknown',username:'unknown',pic:''};const fullText=t.note_tweet?.text||t.text||'';const isLong=fullText.length>400;const url='https://twitter.com/'+a.username+'/status/'+t.id;const m=t.public_metrics||{};const media=t._media||[];const article=t.article;let mh='';if(media.length===1){const i=media[0];mh='<div class="tweet-media"><div class="media-wrapper"><img src="'+esc(i.url)+'" alt="" loading="lazy">'+(i.type!=='photo'?'<span class="video-badge">▶ Video</span>':'')+'</div></div>'}else if(media.length>1){mh='<div class="tweet-media multi">'+media.map(i=>'<div class="media-wrapper"><img src="'+esc(i.url)+'" alt="" loading="lazy">'+(i.type!=='photo'?'<span class="video-badge">▶</span>':'')+'</div>').join('')+'</div>'}let ah='';if(article&&!media.length){ah='<div class="article-card">'+(article.title?'<div class="article-title">'+esc(article.title)+'</div>':'')+(article.preview_text?'<div class="article-preview">'+esc(article.preview_text)+'</div>':'')+'</div>'}const sm=isLong?'<span class="show-more" onclick="event.stopPropagation();toggleText(\''+t.id+'\')">Show more</span>':'';return'<div class="tweet" onclick="window.open(\''+url+'\',\'_blank\')"><div class="tweet-header"><img class="avatar" src="'+esc(a.pic)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"><div class="tweet-header-right"><div class="author-line"><span class="author-name">'+esc(a.name)+'</span><span class="author-handle">@'+esc(a.username)+'</span><span class="dot">·</span><span class="tweet-date">'+fmtDate(t.created_at)+'</span></div></div></div><div class="tweet-body"><div class="tweet-text'+(isLong?' collapsed':'')+'" id="text-'+t.id+'">'+linkify(fullText)+'</div>'+sm+mh+ah+'<div class="metrics"><span class="metric reply"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'+fmt(m.reply_count)+'</span><span class="metric rt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>'+fmt(m.retweet_count)+'</span><span class="metric like"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'+fmt(m.like_count)+'</span><span class="metric view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'+fmt(m.impression_count)+'</span><span class="metric bm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'+fmt(m.bookmark_count)+'</span></div></div></div>'}
window.toggleText=function(id){const el=document.getElementById('text-'+id);const btn=el.nextElementSibling;if(el.classList.contains('collapsed')){el.classList.remove('collapsed');btn.textContent='Show less'}else{el.classList.add('collapsed');btn.textContent='Show more'}};
function render(){const feed=document.getElementById('feed');const toc=document.getElementById('toc');const filtered=getFiltered(TWEETS);const sorted=getSorted(filtered);document.getElementById('count').textContent=sorted.length+' bookmarks';if(!sorted.length){feed.innerHTML='<div class="no-results">No bookmarks match your search.</div>';toc.innerHTML='';return}let html='',tocHtml='<div class="toc-title">Jump to</div>',lastMonth='';const showDates=currentSort==='date-desc'||currentSort==='date-asc';for(const t of sorted){if(showDates){const mk=monthKey(t.created_at);if(mk!==lastMonth){const sid='section-'+mk.replace(/\s/g,'-');html+='<div class="date-section" id="'+sid+'">'+mk+'</div>';tocHtml+='<a href="#'+sid+'">'+mk+'</a>';lastMonth=mk}}html+=renderTweet(t)}feed.innerHTML=html;toc.innerHTML=showDates?tocHtml:''}
document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=btn.dataset.sort;render()})});
document.getElementById('search').addEventListener('input',e=>{searchQuery=e.target.value;render()});
document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('search').focus()}if(e.key==='Escape')document.getElementById('search').blur()});
render();
</script></body></html>
